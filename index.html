              // 3. [메모리 확보] 이미지가 브라우저에 캐싱된 후, 무거운 프리로더를 강제 삭제하여 RAM 공간을 확보합니다.
              setTimeout(() => {
                  const preloader = document.getElementById('html-global-preloader');
                  if (preloader && preloader.parentNode) {
                      preloader.parentNode.removeChild(preloader);
                  }
              }, 3000);
          }, []);

          const handleStart = () => {
            setHasStarted(true);
            pushToDataLayer('StartTest');
          };

          const handleSelect = (id) => {
            setSelectedOption(id);
            pushToDataLayer('quiz_progress', { step: currentStep + 1, selected_option: id });

            setTimeout(() => {
              const newAnswers = [...answers, id];
              setAnswers(newAnswers);
              setSelectedOption(null);

              if (currentStep < QUIZ_QUESTIONS.length - 1) {
                setCurrentStep(currentStep + 1);
              } else {
                calculateResult(newAnswers);
              }
            }, 100);
          };

          const handleBack = () => {
            if (currentStep > 0) {
              setCurrentStep(currentStep - 1);
              setAnswers(answers.slice(0, -1));
            }
          };

          const calculateResult = (finalAnswers) => {
            const counts = { A: 0, B: 0, C: 0, D: 0 };
            finalAnswers.forEach(ans => counts[ans]++);
            const topResult = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            
            setResultKey(topResult);
            setShowResult(true);

            const isSubmitFired = sessionStorage.getItem('tiktok_SubmitForm_fired');
            if (!isSubmitFired) {
                pushToDataLayer('SubmitForm');
                sessionStorage.setItem('tiktok_SubmitForm_fired', 'true');
            }
            pushToDataLayer('ViewResult', { result_persona: topResult });
          };

          const handleReload = () => {
            pushToDataLayer('ClickTryAgain');
            setHasStarted(false);
            setCurrentStep(0);
            setAnswers([]);
            setSelectedOption(null);
            setShowResult(false);
            setResultKey(null);
            window.scrollTo(0, 0);
          };

          const showToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(""), 3000);
          };

          const handleSaveImage = async () => {
            pushToDataLayer('ClickSaveImage');
            if (!window.html2canvas) {
              showToast("Loading image capture module. Please try again in a moment.");
              return;
            }
            try {
              setIsCapturing(true);
              showToast("Generating image... Please wait ⏳");
              
              await document.fonts.ready;
              // 최적화 1: 캡처 영역을 맨 위로 올려 불필요한 브라우저 화면 렌더링 방지
              window.scrollTo(0, 0);

              const targetElement = resultCardRef.current;
              const container = document.getElementById('result-scroll-container');
              const origContainerOverflow = container ? container.style.overflow : '';
              const origContainerHeight = container ? container.style.height : '';

              if (container) {
                container.style.overflow = 'visible';
                container.style.height = 'auto';
              }

              // 최적화 2: 캡처 전, 숨겨진 메모리 킬러 태그들을 확실하게 싹 다 지워버림
              const globalPreloader = document.getElementById('html-global-preloader');
              if (globalPreloader) globalPreloader.remove();

              await new Promise(r => setTimeout(r, 300));

              // ★★★ [메모리 폭발 완벽 방어] ignoreElements 필터 및 JPEG 인코딩 적용 ★★★
              const canvas = await window.html2canvas(targetElement, {
                scale: 1, // 배율 1 고정 (과도한 픽셀 연산 방지)
                useCORS: true,
                allowTaint: false, // Security Error 및 튕김 방지
                logging: false,
                backgroundColor: '#f3f4f6',
                width: targetElement.offsetWidth,
                ignoreElements: (node) => {
                  // 화면에 보이지 않는 요소들을 html2canvas가 복제하지 못하게 강제 차단
                  if (node.id === 'native-splash' || node.id === 'html-global-preloader') {
                    return true;
                  }
                  return false;
                },
                onclone: (clonedDocument) => {
                  const clonedTarget = clonedDocument.getElementById('result-card');
                  if (clonedTarget) {
                    clonedTarget.style.width = targetElement.offsetWidth + 'px';
                    clonedTarget.style.maxWidth = '390px';
                    clonedTarget.style.margin = '0 auto';

                    const locationTexts = clonedTarget.querySelectorAll('.recommended-location');
                    locationTexts.forEach(el => {
                      el.style.background = 'none';
                      el.style.webkitBackgroundClip = 'initial';
                      el.style.webkitTextFillColor = 'initial';
                      el.style.color = '#4f46e5'; 
                      el.style.display = 'block';
                      el.style.lineHeight = 'normal';
                      el.style.letterSpacing = 'normal';
                      el.style.transform = 'none';
                      el.style.padding = '0';
                      el.style.margin = '0';
                      el.style.textAlign = 'center';
                    });

                    const wrappers = clonedTarget.querySelectorAll('.recommended-location-wrapper');
                    wrappers.forEach(el => {
                      el.style.display = 'flex';
                      el.style.alignItems = 'center';
                      el.style.justifyContent = 'center';
                    });
                  }
                }
              });

              if (container) {
                container.style.overflow = origContainerOverflow;
                container.style.height = origContainerHeight;
              }

              // 최적화 3: 메모리를 어마어마하게 먹는 PNG 대신 가벼운 JPEG로 압축하여 데이터 생성
              const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
              
              const link = document.createElement('a');
              link.download = 'my-korea-result.jpg';
              link.href = dataUrl;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);

              // 최적화 4: 캡처에 사용된 거대한 캔버스 데이터를 브라우저 램(RAM)에서 강제로 비움
              canvas.width = 0;
              canvas.height = 0;

              setIsCapturing(false);
              showToast("Image saved successfully! 📸");
            } catch (err) {
              console.error(err);
              const container = document.getElementById('result-scroll-container');
              if (container) { container.style.overflow = 'hidden'; container.style.height = '100dvh'; }
              setIsCapturing(false);
              // 실패 시 모바일 친화적인 대안 안내
              showToast("Save failed. Please screenshot this page!");
            }
          };

          const handleCopyLink = () => {
            pushToDataLayer('ShareResult', { platform: 'copy_link' });
            const baseUrl = window.location.href.split('?')[0];
            const shareUrl = `${baseUrl}?share=1`;
            const textArea = document.createElement("textarea");
            textArea.value = shareUrl;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand("copy"); showToast("Link copied to clipboard! 🔗"); } 
            catch (err) { showToast("Failed to copy link."); }
            textArea.remove();
          };

          const handleShare = (platform) => {
            pushToDataLayer('ShareResult', { platform: platform });
            const baseUrl = window.location.href.split('?')[0];
            const shareUrl = `${baseUrl}?share=1`;
            const shareTitle = "My Korea Travel Persona!";
            
            switch(platform) {
              case 'x': window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareTitle)}&url=${encodeURIComponent(shareUrl)}`); break;
              case 'facebook': window.open('https://www.facebook.com/', '_blank'); break;
              case 'instagram': window.open('https://www.instagram.com/', '_blank'); break;
              case 'tiktok': window.open('https://www.tiktok.com/', '_blank'); break;
              default: handleCopyLink();
            }
          };

          const Toast = () => {
            if (!toastMessage) return null;
            return (
              <div className="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium animate-bounce whitespace-nowrap">
                {toastMessage}
              </div>
            );
          };

          if (!hasStarted) {
            return (
              <div className="min-h-[100dvh] w-full flex items-center justify-center bg-gray-100 font-sans">
                <div className="w-full max-w-[390px] min-h-[100dvh] md:min-h-[844px] bg-white flex flex-col items-center justify-center relative md:rounded-[2.5rem] md:shadow-2xl overflow-hidden text-center">

                  <img 
                    src={`https://drive.google.com/thumbnail?id=126X5mF6EMnU4bcD0GGtQVCygXUB-uXQV`}
                    onError={(e) => window.handleImgError(e.target, '126X5mF6EMnU4bcD0GGtQVCygXUB-uXQV')}
                    alt="Korea Travel Persona" 
                    className="absolute inset-0 w-full h-full object-cover z-0"
                    loading="eager"
                    fetchPriority="high"
                  />
                  
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm z-0 pointer-events-none"></div>

                  <div className="relative z-10 flex flex-col items-center justify-center h-full w-full px-4 pb-24">
                    <div className="flex flex-col items-center justify-center mb-10 text-center w-full">
                      <p className="text-white font-bold uppercase tracking-wider mb-2 drop-shadow-lg text-[4.5vw] min-[390px]:text-[18px]" style={{ textShadow: '0 2px 10px rgba(0,0,0,0.8)' }}>
                        No more <span className="text-[#00c853] font-black text-[7vw] min-[390px]:text-[28px] italic px-1">Now-Now</span>
                      </p>
                      <h1 className="flex flex-col items-center leading-[1.05] w-full">
                        <span className="text-[#2962ff] font-black uppercase tracking-tighter italic pr-2 text-[16vw] min-[390px]:text-[64px]" style={{ textShadow: '-2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0 10px 20px rgba(0,0,0,0.6)' }}>
                          KOREA
                        </span>
                        <span className="text-white font-extrabold tracking-[0.2em] mt-1 mb-4 text-[5vw] min-[390px]:text-[20px]" style={{ textShadow: '0 2px 10px rgba(0,0,0,0.8)' }}>
                          IS CALLING
                        </span>
                        <span className="text-white font-bold uppercase tracking-widest mb-1 mt-1 text-[4.5vw] min-[390px]:text-[18px]" style={{ textShadow: '0 2px 10px rgba(0,0,0,0.8)' }}>
                          Find your
                        </span>
                        <span className="text-[#ff1744] font-black uppercase tracking-tighter italic pr-2 text-[12.5vw] min-[390px]:text-[50px]" style={{ textShadow: '-2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0 10px 20px rgba(0,0,0,0.6)' }}>
                          K-PERSONA
                        </span>
                      </h1>
                    </div>
                    <button onClick={handleStart} className="w-full max-w-[340px] border-2 py-4 rounded-2xl font-extrabold text-xl transition-colors shadow-xl bg-[#fbbf24] border-[#d97706] hover:bg-[#f59e0b] text-gray-900 cursor-pointer">
                      Start ▶
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          if (showResult && resultKey) {
            const result = RESULTS_DATA[resultKey];
            return (
              <div className="min-h-[100dvh] w-full flex items-start justify-center bg-gray-100 font-sans md:py-8">
                <div id="result-scroll-container" className="w-full max-w-[390px] min-h-[100dvh] bg-[#f3f4f6] flex flex-col relative md:rounded-[2.5rem] md:shadow-2xl overflow-hidden pb-10">
                  <Toast />
                  <div id="result-card" ref={resultCardRef} className="bg-[#f3f4f6] w-full pt-8 pb-6 px-5 flex flex-col space-y-4 relative z-0">
                    <div className="text-center pb-2">
                      <h2 className="text-xl font-bold tracking-widest text-indigo-600 uppercase">YOUR K-TRAVEL PERSONA</h2>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border-2 border-gray-200 overflow-hidden flex flex-col items-center justify-center">
                      {result.driveId && (
                        <img 
                          src={`https://drive.google.com/thumbnail?id=${result.driveId}`}
                          onError={(e) => window.handleImgError(e.target, result.driveId)}
                          alt={result.badge} 
                          crossOrigin="anonymous" 
                          loading="eager" 
                          className="w-full h-auto object-cover block" 
                        />
                      )}
                    </div>
                    
                    <a href="https://english.visitkorea.or.kr/svc/main/index.do" target="_blank" rel="noopener noreferrer" onClick={() => pushToDataLayer('ClickOutbound')} className="block w-full bg-[#fbbf24] border-2 border-[#d97706] hover:bg-[#f59e0b] text-gray-900 text-center py-4 rounded-xl font-bold text-lg transition-colors animate-soft-glow">
                      Custom Your Route!
                    </a>

                    <div className="bg-white rounded-2xl shadow-sm border-2 border-gray-200 p-6 text-center">
                      <h4 className="text-sm font-bold text-gray-500 mb-2">{result.subtitle}</h4>
                      <h3 className="text-2xl font-extrabold text-[#d28014] mb-4">{result.badge}</h3>
                      <div className="bg-blue-50/50 rounded-xl p-4 border border-blue-100">
                        {result.shortDesc.split('\n').map((line, i) => (<p key={i} className="text-gray-800 font-bold leading-relaxed">{line}</p>))}
                      </div>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border-2 border-gray-200 p-6">
                      <h4 className="text-sm font-bold text-gray-800 flex items-center gap-2 mb-3">
                        <Lightbulb /> Recommended Travel
                      </h4>
                      <div className="inline-flex items-center justify-center bg-indigo-50 border border-indigo-100 px-4 py-2 rounded-lg mb-3 recommended-location-wrapper">
                        <p className="font-extrabold text-indigo-600 text-lg recommended-location m-0 leading-snug">{result.mustVisit}</p>
                      </div>
                      <p className="text-gray-700 text-sm leading-relaxed font-medium whitespace-pre-line">Tip: {result.tip}</p>
                    </div>
                  </div>
                  <div className="px-5 mt-2 mb-6 flex gap-3">
                    <button onClick={handleReload} className="flex-1 bg-white border-2 border-gray-200 text-gray-800 py-3.5 rounded-xl font-bold flex items-center justify-center hover:bg-gray-50 transition-colors shadow-sm">
                      Try Again
                    </button>
                    <button onClick={handleSaveImage} disabled={isCapturing} className={`flex-1 border-2 py-3.5 rounded-xl font-bold flex items-center justify-center transition-colors shadow-sm ${isCapturing ? 'bg-gray-300 border-gray-300 text-gray-500 cursor-not-allowed' : 'bg-[#4ade80] border-[#22c55e] text-white hover:bg-[#22c55e]'}`}>
                      {isCapturing ? 'Saving...' : 'Save Image'}
                    </button>
                  </div>
                  <div className="px-5 mb-6">
                    <div className="bg-white rounded-2xl p-6 border-2 border-gray-200 shadow-sm">
                      <h4 className="text-center text-sm font-bold text-gray-500 mb-4 tracking-widest uppercase">Share Your Result</h4>
                      <div className="flex justify-center gap-3 mb-6">
                        <button onClick={() => handleShare('instagram')} className="w-12 h-12 rounded-xl bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white flex items-center justify-center hover:opacity-90 transition-opacity shadow-sm"><Instagram /></button>
                        <button onClick={() => handleShare('tiktok')} className="w-12 h-12 rounded-xl bg-black text-white flex items-center justify-center hover:opacity-90 transition-opacity shadow-sm"><svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 20.1a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1.04-.1z"/></svg></button>
                        <button onClick={() => handleShare('facebook')} className="w-12 h-12 rounded-xl bg-[#1877f2] text-white flex items-center justify-center hover:opacity-90 transition-opacity shadow-sm"><Facebook /></button>
                        <button onClick={() => handleShare('x')} className="w-12 h-12 rounded-xl bg-black text-white flex items-center justify-center hover:opacity-90 transition-opacity shadow-sm"><svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></button>
                        <button onClick={handleCopyLink} className="w-12 h-12 rounded-xl bg-gray-200 text-gray-700 flex items-center justify-center hover:bg-gray-300 transition-colors shadow-sm"><LinkIcon /></button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          const question = QUIZ_QUESTIONS[currentStep];
          const progressPercent = ((currentStep) / QUIZ_QUESTIONS.length) * 100;

          return (
            <div className="min-h-[100dvh] w-full flex items-center justify-center bg-gray-100 font-sans">
              <div className="w-full max-w-[390px] min-h-[100dvh] md:min-h-[844px] bg-white flex flex-col relative md:rounded-[2.5rem] md:shadow-2xl overflow-y-auto overflow-x-hidden">
                <div className="flex items-center p-4 pt-6 gap-4">
                  <button onClick={handleBack} disabled={currentStep === 0} className={`transition-colors ${currentStep === 0 ? 'text-white' : 'text-gray-400 hover:text-gray-600 cursor-pointer'}`}><ArrowLeft /></button>
                  <div className="flex-1 bg-gray-100 h-4 rounded-full overflow-hidden">
                    <div className="bg-red-500 h-full transition-all duration-500 ease-out rounded-full" style={{width: `${progressPercent > 0 ? progressPercent : 5}%`}}></div>
                  </div>
                </div>
                <div className="px-5 py-2 mb-6 mt-4 w-full">
                  <div className="flex items-center gap-2 w-full overflow-hidden">
                    <span className="bg-purple-100 text-purple-600 min-w-[28px] w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0 shadow-sm">Q{currentStep + 1}</span>
                    <h1 className="font-extrabold text-gray-800 leading-snug whitespace-nowrap tracking-tight shrink w-full text-[4.8vw] min-[390px]:text-[19px]" style={{ transform: 'scaleX(0.95)', transformOrigin: 'left center' }}>{question.question}</h1>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3 px-5 flex-1 content-start pb-10">
                  {question.options.map((option) => {
                    const isSelected = selectedOption === option.id;
                    return (
                      <button key={`${currentStep}-${option.id}`} onClick={() => handleSelect(option.id)} disabled={selectedOption !== null} className={`relative overflow-hidden w-full aspect-[4/5] border-2 rounded-2xl p-3 flex flex-col items-center justify-between transition-all duration-200 ${isSelected ? 'border-red-500 bg-red-50 text-red-500 shadow-[0_2px_0_#ef4444] scale-95' : 'border-gray-200 bg-white text-gray-700 active:bg-gray-50 active:border-gray-300 shadow-[0_2px_0_#e5e5e5] md:hover:bg-gray-50 md:hover:border-gray-300'}`}>
                        <div className="flex-1 w-full flex items-center justify-center min-h-0 relative z-0">
                          {option.driveId && (
                            <img 
                              src={`https://drive.google.com/thumbnail?id=${option.driveId}`} 
                              onError={(e) => window.handleImgError(e.target, option.driveId)}
                              alt={option.text} 
                              loading="eager" 
                              className="w-full h-full object-contain drop-shadow-sm transition-transform scale-100" 
                            />
                          )}
                        </div>
                        <span className={`font-bold text-[15px] mt-2 relative z-10 px-2 py-0.5 rounded bg-white/70 ${isSelected ? 'text-red-500' : 'text-gray-600'}`}>{option.text}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
